name: Update Trading Data

on:
  schedule:
    # 2 veces al día: 8:00 AM y 7:00 PM CST (14:00 UTC y 01:00 UTC)
    - cron: '0 14 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:  # Permitir ejecución manual

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Get live trading data from Bybit
        run: |
          python3 .github/scripts/fetch-data.py

      - name: Commit and push if changed
        run: |
          git config user.name "Raven Bot"
          git config user.email "raven@wildbot.ai"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to data"
          else
            git commit -m "📊 Actualización automática de datos $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
